<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
  </head>

  <body>
    <h1 align="center">Image Gallery Using Tables and Nested Tables</h1>

    <table
      align="center"
      border="1"
      cellspacing="0"
      cellpadding="10"
      width="100"
    >
      <tr>
        <td width="50%" align="center">
          <table border="1" cellspacing="0" cellpadding="10" width="300">
            <tr>
              <th colspan="1">Mountains Gallery</th>
            </tr>
            <tr>
              <td align="center">
                <img src="mountain_view.webp"  height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Mountain View</td>
            </tr>
            <tr>
              <td align="center">
                <img src="snow_peak.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Snow Peak</td>
            </tr>
          </table>
        </td>

        <td width="50%" align="center">
          <table border="1" cellspacing="0" cellpadding="10" width="300">
            <tr>
              <th>Forest Gallery</th>
            </tr>
            <tr>
              <td align="center">
                <img src="forest.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Green Forest</td>
            </tr>
            <tr>
              <td align="center">
                <img src="forestpath.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Forest Path</td>
            </tr>
          </table>
        </td>
      </tr>

      <tr>
        <td align="center">
          <table border="1" cellspacing="0" cellpadding="10" width="300">
            <tr>
              <th>Beach Gallery</th>
            </tr>
            <tr>
              <td align="center">
                <img src="sunnybe.jpg" height="200" width="200" />
              </td>
            </tr>
            <tr>
              <td align="center">Sunny Beach</td>
            </tr>
            <tr>
              <td align="center">
                <img src="ocean_wave.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Ocean Waves</td>
            </tr>
          </table>
        </td>

        <td align="center">
          <table border="1" cellspacing="0" cellpadding="10" width="300">
            <tr>
              <th>City Gallery</th>
            </tr>
            <tr>
              <td align="center">
                <img src="city_gall.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Street City</td>
            </tr>
            <tr>
              <td align="center">
                <img src="night_view.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Night View</td>
            </tr>
          </table>
        </td>
      </tr>

      <tr>
        <td align="center">
          <table border="1" cellspacing="0" cellpadding="10" width="300">
            <tr>
              <th>Wildlife Gallery</th>
            </tr>
            <tr>
              <td align="center">
                <img src="lion.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Lion</td>
            </tr>
            <tr>
              <td align="center">
                <img src="monkey.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Monkey</td>
            </tr>
          </table>
        </td>

        <td align="center">
          <table border="1" cellspacing="0" cellpadding="10" width="300">
            <tr>
              <th>Lake Gallery</th>
            </tr>
            <tr>
              <td align="center">
                <img src="lake.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Lake</td>
            </tr>
            <tr>
              <td align="center">
                <img src="sunset_lake.jpg" height="200" width="200"/>
              </td>
            </tr>
            <tr>
              <td align="center">Sunset</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
